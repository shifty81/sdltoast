# Harvest Quest — Default Tileset Configuration
# Maps semantic tile types to sprite IDs in world_tileset.png
#
# Format:
#   TILE_TYPE  SPRITE_ID          — base mapping for all seasons
#   TILE_TYPE.SEASON  SPRITE_ID   — seasonal override
#
# Special directives:
#   TILE_SIZE           — pixel size of each tile (16 or 32)
#   SHEET_FILE          — path to the sprite sheet PNG
#   WALL_AUTOTILE_BASE  — base ID for auto-tiled walls (visual offsets 0-10)
#   CROP_GROWTH_BASE    — base ID for crop growth stages (offsets 0-4)
#   DECORATION_BASE     — base ID for decorations (offsets 0-3)
#   TREE_BASE           — base ID for trees
#   WATER_ANIM_FRAMES   — space-separated frame IDs for water animation

TILE_SIZE 32
SHEET_FILE assets/tilesets/world_tileset.png

# Base tile mappings (default 32x32 tileset, 16 columns)
GRASS 0
DIRT 1
SOIL 2
WATER 3
STONE 4
SAND 5
FLOOR 6
WALL 7
DOOR 20
CROP 30
DECORATION 40
TREE 50
VOID 0

# Auto-tile and animation ranges
WALL_AUTOTILE_BASE 7
CROP_GROWTH_BASE 30
DECORATION_BASE 40
TREE_BASE 50
WATER_ANIM_FRAMES 3 21 22 23
