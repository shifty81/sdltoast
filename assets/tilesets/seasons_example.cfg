# Harvest Quest — Seasonal Tileset Configuration (Example)
# For use with "The Seasons Collective - RPG/Farming Tileset" or similar
# seasonal tilesets that provide separate tile variants per season.
#
# The tileset should be arranged in a grid where seasonal variants are
# offset from the base tile ID. For example, if the sheet is 16 columns
# wide and each season's tiles occupy one section, a 64-tile seasonal
# offset means season N starts at (base + N * 64).
#
# To use:
#   1. Place your seasonal tileset PNG at the SHEET_FILE path below
#   2. Adjust the sprite IDs to match your tileset layout
#   3. Rename this file to tileset.cfg (or update the path in Game.cpp)

TILE_SIZE 16
SHEET_FILE assets/tilesets/seasons_tileset.png

# --- Base tile mappings (used when no seasonal override exists) ---
GRASS 0
DIRT 1
SOIL 2
WATER 3
STONE 4
SAND 5
FLOOR 6
WALL 7
DOOR 20
CROP 30
DECORATION 40
TREE 50
VOID 0

# --- Seasonal overrides ---
# Each season can map any tile type to a different sprite ID.
# If a TILE.SEASON entry is missing, the base ID is used.

# Spring (column 0 of the seasonal sheet)
GRASS.SPRING 0
DIRT.SPRING 1
SOIL.SPRING 2
WATER.SPRING 3
TREE.SPRING 50
DECORATION.SPRING 40

# Summer (offset by 64 tiles for example)
GRASS.SUMMER 64
DIRT.SUMMER 65
SOIL.SUMMER 66
WATER.SUMMER 67
TREE.SUMMER 114
DECORATION.SUMMER 104

# Autumn / Fall (offset by 128)
GRASS.FALL 128
DIRT.FALL 129
SOIL.FALL 130
WATER.FALL 131
TREE.FALL 178
DECORATION.FALL 168

# Winter (offset by 192)
GRASS.WINTER 192
DIRT.WINTER 193
SOIL.WINTER 194
WATER.WINTER 195
TREE.WINTER 242
DECORATION.WINTER 232

# --- Auto-tile and animation ranges ---
WALL_AUTOTILE_BASE 7
CROP_GROWTH_BASE 30
DECORATION_BASE 40
TREE_BASE 50
WATER_ANIM_FRAMES 3 21 22 23
